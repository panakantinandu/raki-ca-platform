spring:
  jpa:
    show-sql: false

server:
  tomcat:
    # Sized for a small-memory container (e.g. Railway's lower tiers), not a large fleet -
    # each pooled thread reserves its own stack, and 200 threads was needlessly generous for
    # this app's actual traffic. 50 concurrent in-flight requests is still well above what a
    # handful of CA firms generate; raise this once real usage actually approaches it.
    max-threads: 50
    accept-count: 50

logging:
  level:
    root: WARN
    com.caagent: INFO

# In production: JWT_SECRET, DB credentials, REDIS_HOST, GOOGLE_CLIENT_ID/SECRET,
# RAZORPAY keys and CORS_ALLOWED_ORIGINS must all be supplied as real environment
# variables / secrets manager entries. Never commit real secrets to source control.
